version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: budtr-postgres-prod
    environment:
      - POSTGRES_DB=budtr_db
      - POSTGRES_USER=budtr_user
      - POSTGRES_PASSWORD=budtr_password
      # Memory optimization for t4g.nano
      - POSTGRES_SHARED_BUFFERS=32MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=64MB
      - POSTGRES_WORK_MEM=2MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/backend/migrations:/docker-entrypoint-initdb.d/
      - ./postgres.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - budtr-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: '0.4'
        reservations:
          memory: 64M
          cpus: '0.2'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budtr_user -d budtr_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: budtr-backend:latest
    container_name: budtr-backend-prod
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=budtr_user
      - DB_PASSWORD=budtr_password
      - DB_NAME=budtr_db
      - ALLOWED_ORIGINS=https://budtr.com,https://staging.budtr.com
    networks:
      - budtr-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: '0.4'
        reservations:
          memory: 48M
          cpus: '0.2'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  budtr-network:
    driver: bridge

volumes:
  postgres_data:
