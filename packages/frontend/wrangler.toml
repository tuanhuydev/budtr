name = "budtr-frontend"
compatibility_date = "2024-07-01"
pages_build_output_dir = "dist"

[env.production]
name = "budtr-frontend"
route = "budtr.com/*"  # Replace with your domain
compatibility_date = "2024-07-01"

[env.staging]
name = "budtr-frontend-staging"
route = "staging.budtr.com/*"  # Replace with your staging domain
compatibility_date = "2024-07-01"

# Build configuration
[build]
command = "pnpm run build"
cwd = ""
watch_dir = "src"

# Environment variables for production
[env.production.vars]
VITE_API_BASE_URL = "https://api.budtr.com"  # Your backend API URL
VITE_APP_ENV = "production"

# Environment variables for staging
[env.staging.vars]
VITE_API_BASE_URL = "https://staging-api.budtr.com"  # Your staging backend API URL
VITE_APP_ENV = "staging"

# Environment variables for preview/development
[vars]
VITE_API_BASE_URL = "http://localhost:8080"  # Local backend for development
VITE_APP_ENV = "development"

# Custom headers for security
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache headers for static assets
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# SPA routing - redirect all routes to index.html
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
conditions = {Header = "Accept=text/html"}

# Functions directory (if you need Cloudflare Functions)
# functions = "functions"
