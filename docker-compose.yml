version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: budtr-postgres
    environment:
      - POSTGRES_DB=budtr_db
      - POSTGRES_USER=budtr_user
      - POSTGRES_PASSWORD=budtr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/backend/migrations:/docker-entrypoint-initdb.d/
    networks:
      - budtr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budtr_user -d budtr_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: budtr-backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=budtr_user
      - DB_PASSWORD=budtr_password
      - DB_NAME=budtr_db
    networks:
      - budtr-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: budtr-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - budtr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  budtr-network:
    driver: bridge

volumes:
  postgres_data:
  backend-data:
